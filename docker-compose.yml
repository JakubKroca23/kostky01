services:
  kostky-game:
    build: .
    container_name: kostky-game
    restart: always
    expose:
      - "3001"
    networks:
      - appwrite
    labels:
      - "traefik.enable=true"
      # Klíčové: Musí tu být doména, na které to opravdu hledáš
      - "traefik.http.routers.kostky.rule=Host(`kostky.propoj.app`)"
      - "traefik.http.routers.kostky.entrypoints=websecure"
      - "traefik.http.routers.kostky.tls=true"
      # Resolver v Appwrite je 'letsencrypt', to víme z tvého logu
      - "traefik.http.routers.kostky.tls.certresolver=letsencrypt"
      - "traefik.http.services.kostky.loadbalancer.server.port=3001"

networks:
  appwrite:
    # Síť se v Appwrite jmenuje 'appwrite' (pokud by to nešlo, zkus 'appwrite_appwrite')
    external: true
